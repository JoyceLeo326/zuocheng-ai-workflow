name: Bootstrap project files

on:
  push:
    paths:
      - .github/workflows/bootstrap.yml

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch the verified production artifact
        shell: bash
        run: |
          set -euo pipefail
          base="https://zuocheng-ai-workflow.vercel.app"
          mkdir -p assets docs

          fetch() {
            curl --fail --show-error --location \
              --retry 8 --retry-delay 2 --retry-all-errors \
              "$base/$1" -o "$2"
          }

          fetch "" "index.html"
          fetch "styles.css" "styles.css"
          fetch "script.js" "script.js"
          fetch "assets/og-cover.jpg" "assets/og-cover.jpg"
          fetch "assets/og-cover.svg" "assets/og-cover.svg"
          fetch "assets/%E5%81%9A%E6%88%90-AI%E5%AD%A6%E4%B9%A0%E5%B7%A5%E4%BD%9C%E6%B5%81.pdf" "assets/做成-AI学习工作流.pdf"
          fetch "docs/content-system.md" "docs/content-system.md"
          fetch "docs/launch-playbook.md" "docs/launch-playbook.md"
          fetch "docs/measurement.md" "docs/measurement.md"
          fetch "docs/product-architecture.md" "docs/product-architecture.md"

          cat > .gitignore <<'EOF'
          .DS_Store
          qa/
          EOF

          cat > vercel.json <<'EOF'
          {
            "$schema": "https://openapi.vercel.sh/vercel.json",
            "cleanUrls": true,
            "trailingSlash": false,
            "headers": [
              {
                "source": "/(.*)",
                "headers": [
                  { "key": "X-Content-Type-Options", "value": "nosniff" },
                  { "key": "X-Frame-Options", "value": "SAMEORIGIN" },
                  { "key": "Referrer-Policy", "value": "strict-origin-when-cross-origin" },
                  { "key": "Permissions-Policy", "value": "camera=(), microphone=(), geolocation=()" }
                ]
              }
            ]
          }
          EOF

          cat > README.md <<'EOF'
          # 做成■

          > 别再收藏工具，先做成一件事。

          ![做成■｜从模糊待办到可交付结果](assets/og-cover.jpg)

          做成■ 是一套面向大学生真实任务的 AI 学习工作流。它不从模型参数或工具清单讲起，而是从课堂汇报、文献梳理、用户调研、商赛分析、答辩准备等近期必须提交的任务开始，带用户完成从 `□ 待办` 到 `■ 交付` 的完整闭环。

          ## 产品结构

          - **7 天起步课**：带着一项真实任务，每天推进一个关键节点，第 7 天形成可提交结果。
          - **18 课系统课**：覆盖定义任务、寻找依据、组织结构、生成初稿、核验表达、沉淀复用六次闭环。
          - **学科任务包**：按具体任务提供输入清单、步骤卡、提示结构、核验表与交付模板。

          网站内置第一课“25 页资料 → 3 页课堂汇报”的完整工作台，也呈现海报、短视频分镜、社群触点、14 天上线节奏、增长漏斗与反馈迭代机制。

          ## 在线体验

          - [打开做成■](https://zuocheng-ai-workflow.vercel.app/)
          - [下载完整产品手册](https://zuocheng-ai-workflow.vercel.app/assets/%E5%81%9A%E6%88%90-AI%E5%AD%A6%E4%B9%A0%E5%B7%A5%E4%BD%9C%E6%B5%81.pdf)

          ## 本地运行

          这是一个无构建步骤、无第三方依赖的静态网站：

          ```bash
          python3 -m http.server 4173
          ```

          然后访问 `http://localhost:4173`。

          ## 文件结构

          ```text
          .
          ├── index.html
          ├── styles.css
          ├── script.js
          ├── vercel.json
          ├── assets
          │   ├── og-cover.jpg
          │   ├── og-cover.svg
          │   └── 做成-AI学习工作流.pdf
          └── docs
              ├── product-architecture.md
              ├── content-system.md
              ├── launch-playbook.md
              └── measurement.md
          ```

          ## 设计与交互

          - 核心符号：`□ → ■`，分别代表待办与完成。
          - 颜色：暖纸白、石墨黑、钴蓝、完成绿与核验红。
          - 交互：7 天路径、第一课工作台、资料证据切换、3 页汇报、短视频分镜、社群文案、上线日历、漏斗实验与反馈迭代。
          - 可访问性：支持键盘焦点、语义化标签、状态播报与 `prefers-reduced-motion`。
          - 进度：7 天路径的完成状态会保存在浏览器本地。

          ## 产品文档

          - [产品架构](docs/product-architecture.md)
          - [内容系统](docs/content-system.md)
          - [14 天上线手册](docs/launch-playbook.md)
          - [指标与实验](docs/measurement.md)
          EOF

      - name: Commit complete project
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitignore README.md index.html styles.css script.js vercel.json assets docs
          git diff --cached --quiet || git commit -m "Launch 做成 AI learning workflow"
          git push origin HEAD:main
