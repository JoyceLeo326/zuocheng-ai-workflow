<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#171717" stroke-opacity="0.075" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="180%" height="180%">
      <feDropShadow dx="14" dy="16" stdDeviation="0" flood-color="#171717" flood-opacity="1"/>
      <feDropShadow dx="26" dy="28" stdDeviation="0" flood-color="#3458FF" flood-opacity="1"/>
    </filter>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#E9ECFF" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#F3F0E8"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1080" cy="102" r="218" fill="#3458FF" fill-opacity="0.10"/>
  <circle cx="1078" cy="102" r="116" fill="#D7FF4F" fill-opacity="0.17"/>

  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" fill="#171717">
    <g transform="translate(76 62)">
      <text x="0" y="36" font-size="36" font-weight="700" letter-spacing="1">做成</text>
      <rect x="82" y="13" width="25" height="25" rx="3" fill="#3458FF"/>
      <rect x="94" y="25" width="15" height="15" rx="2" fill="#D7FF4F"/>
    </g>

    <text x="76" y="226" font-size="72" font-weight="800" letter-spacing="-2">别再收藏工具，</text>
    <text x="76" y="308" font-size="72" font-weight="800" letter-spacing="-2" fill="#3458FF">先做成一件事。</text>
    <text x="79" y="360" font-size="24" font-weight="450" fill="#44443F">从真实任务开始，把模糊待办压成能检查、能提交的结果。</text>

    <g transform="translate(80 420)">
      <rect x="0" y="0" width="144" height="48" rx="24" fill="#171717"/>
      <text x="72" y="31" font-size="18" font-weight="650" fill="#FFFFFF" text-anchor="middle">7 天起步课</text>
      <rect x="156" y="0" width="156" height="48" rx="24" fill="#FFFFFF" stroke="#171717"/>
      <text x="234" y="31" font-size="18" font-weight="650" text-anchor="middle">18 课系统课</text>
      <rect x="324" y="0" width="156" height="48" rx="24" fill="#D7FF4F" stroke="#171717"/>
      <text x="402" y="31" font-size="18" font-weight="650" text-anchor="middle">学科任务包</text>
    </g>

    <g transform="translate(725 150)" filter="url(#shadow)">
      <rect x="0" y="0" width="365" height="332" rx="28" fill="url(#glow)" stroke="#171717" stroke-width="2"/>
      <text x="28" y="43" font-size="16" font-weight="650">任务完成器</text>
      <circle cx="313" cy="36" r="6" fill="#D7FF4F"/>
      <text x="327" y="42" font-size="13" fill="#55554F">就绪</text>

      <rect x="37" y="99" width="70" height="70" rx="4" fill="none" stroke="#171717" stroke-width="7"/>
      <text x="72" y="196" font-size="14" font-weight="600" text-anchor="middle">模糊待办</text>

      <path d="M139 135 H229" stroke="#171717" stroke-width="3"/>
      <path d="M218 124 L231 135 L218 146" fill="none" stroke="#171717" stroke-width="3"/>
      <circle cx="184" cy="135" r="8" fill="#D7FF4F" stroke="#171717" stroke-width="2"/>
      <text x="184" y="164" font-size="11" fill="#5A5A54" text-anchor="middle">拆解 · 取证 · 组装</text>

      <rect x="258" y="94" width="78" height="78" rx="4" fill="#3458FF"/>
      <rect x="269" y="105" width="78" height="78" rx="4" fill="#D7FF4F" fill-opacity="0.78"/>
      <rect x="258" y="94" width="78" height="78" rx="4" fill="#3458FF"/>
      <text x="297" y="196" font-size="14" font-weight="600" text-anchor="middle">可交付结果</text>

      <rect x="28" y="232" width="309" height="70" rx="16" fill="#F3F0E8" stroke="#171717" stroke-opacity="0.22"/>
      <rect x="45" y="249" width="5" height="36" rx="2.5" fill="#FF6555"/>
      <text x="64" y="260" font-size="14" font-weight="650">25 页资料</text>
      <text x="64" y="281" font-size="12" fill="#686861">观点 · 数据 · 出处</text>
      <text x="180" y="273" font-size="22" font-weight="700" fill="#3458FF">→</text>
      <g transform="translate(220 247)">
        <rect x="0" y="0" width="30" height="40" fill="#FFFFFF" stroke="#171717"/>
        <rect x="37" y="0" width="30" height="40" fill="#FFFFFF" stroke="#171717"/>
        <rect x="74" y="0" width="30" height="40" fill="#FFFFFF" stroke="#171717"/>
        <path d="M6 12 H24 M6 19 H20" stroke="#171717" stroke-width="2"/>
        <path d="M43 12 H61 M43 19 H57" stroke="#171717" stroke-width="2"/>
        <path d="M80 12 H98 M80 19 H94" stroke="#171717" stroke-width="2"/>
      </g>
    </g>

    <g transform="translate(79 548)">
      <rect x="0" y="0" width="11" height="11" rx="5.5" fill="#D7FF4F" stroke="#171717" stroke-width="1.5"/>
      <text x="24" y="12" font-size="15" font-weight="550">每课一个交付件</text>
      <rect x="181" y="0" width="11" height="11" rx="5.5" fill="#FF6555" stroke="#171717" stroke-width="1.5"/>
      <text x="205" y="12" font-size="15" font-weight="550">过程有依据</text>
      <rect x="344" y="0" width="11" height="11" rx="5.5" fill="#3458FF" stroke="#171717" stroke-width="1.5"/>
      <text x="368" y="12" font-size="15" font-weight="550">结果可复用</text>
    </g>
  </g>
</svg>
